apiVersion: v1
kind: Namespace
metadata:
  name: vault
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vault
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      tolerations:
      - key: node.kubernetes.io/disk-pressure
        operator: Exists
        effect: NoSchedule
      imagePullSecrets:
      - name: ghcr-auth
      containers:
      - name: vault
        image: ghcr.io/dynamickarabo/vault-deployment:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8200
          name: api
        env:
        - name: VAULT_DEV_ROOT_TOKEN_ID
          value: "root"
        - name: VAULT_DEV_LISTEN_ADDRESS
          value: "0.0.0.0:8200"
        securityContext:
          capabilities:
            add:
            - IPC_LOCK
        args:
        - "server"
        - "-dev"
        - "-dev-root-token-id=root"
        - "-dev-listen-address=0.0.0.0:8200"
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vault
spec:
  type: NodePort
  selector:
    app: vault
  ports:
  - port: 8200
    targetPort: 8200
    nodePort: 30820
    name: api
